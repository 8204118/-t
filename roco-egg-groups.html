<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🥚 洛克王国蛋组图鉴</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#1e293b}
    .container{max-width:1200px;margin:0 auto;padding:20px}
    .header{text-align:center;padding:40px 20px;color:white}
    .header h1{font-size:42px;font-weight:800;margin:0 0 10px;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
    .header p{font-size:18px;opacity:0.9;font-weight:600}
    .main{background:white;border-radius:24px;padding:30px;margin-top:-20px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .search-box{position:relative;margin-bottom:24px}
    .search-box input{width:100%;padding:16px 24px 16px 52px;border:2px solid #e2e8f0;border-radius:16px;font-size:16px;font-family:inherit;transition:all 0.3s}
    .search-box input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,0.1)}
    .search-box .icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:20px}
    .tabs{display:flex;gap:8px;margin-bottom:24px;background:#f1f5f9;padding:6px;border-radius:16px}
    .tab{flex:1;padding:12px 20px;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.3s;background:transparent;color:#64748b}
    .tab.active{background:white;color:#667eea;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
    .card{background:#f8fafc;border-radius:20px;padding:20px;border:2px solid transparent;transition:all 0.3s;cursor:pointer}
    .card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,0.15)}
    .card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,var(--c) 0%,var(--cl) 100%);box-shadow:0 4px 12px var(--cs)}
    .card-title{font-size:18px;font-weight:800}
    .card-count{font-size:13px;color:#64748b;font-weight:600}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;background:#e2e8f0;color:#475569}
    .tag:hover{transform:scale(1.05)}
    .tag.active{background:var(--c);color:white;box-shadow:0 4px 12px var(--cs)}
    .selected-area{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border-radius:20px;padding:24px;margin-bottom:24px;border:2px dashed #60a5fa}
    .selected-title{font-size:18px;font-weight:800;margin-bottom:12px;color:#1e40af}
    .selected-tags{display:flex;flex-wrap:wrap;gap:10px}
    .selected-tag{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;font-size:14px;font-weight:700;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.1);animation:popIn 0.3s}
    @keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:14px;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;transition:all 0.3s;border:none}
    .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;box-shadow:0 4px 14px rgba(102,126,234,0.4)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,0.5)}
    .btn-secondary{background:white;color:#64748b;border:2px solid #e2e8f0}
    .btn-secondary:hover{border-color:#cbd5e1;background:#f8fafc}
    .results{background:#f8fafc;border-radius:20px;padding:24px}
    .result-item{display:flex;align-items:center;gap:12px;padding:16px;background:white;border-radius:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:white;padding:14px 28px;border-radius:12px;font-weight:600;opacity:0;transition:all 0.3s;z-index:9999}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .hidden{display:none}
    @media(max-width:768px){.grid{grid-template-columns:1fr}.header h1{font-size:32px}.main{padding:20px}}
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>🥚 洛克王国蛋组图鉴</h1>
      <p>孵蛋配对查询工具 · 快速找到可配对的精灵组合</p>
    </div>
  </div>
  
  <div class="container">
    <div class="main">
      <!-- Search -->
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索精灵名称..." autocomplete="off">
      </div>
      
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">📋 全部蛋组</button>
        <button class="tab" onclick="switchTab('pair')">💕 配对查询</button>
      </div>
      
      <!-- All Groups Tab -->
      <div id="allTab">
        <div id="eggGrid" class="grid"></div>
      </div>
      
      <!-- Pairing Tab -->
      <div id="pairTab" class="hidden">
        <div class="selected-area">
          <div class="selected-title">🎯 已选精灵（点击上方精灵添加）</div>
          <div id="selectedTags" class="selected-tags">
            <span style="color:#64748b;font-size:14px">暂无选择</span>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:24px">
          <button class="btn btn-primary" onclick="findPairs()">💕 查找可配对</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
        </div>
        <div id="results" class="results hidden"></div>
      </div>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script src="egg-groups-data.js"></script>
  <script>
    let selected = [];
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('allTab').classList.toggle('hidden', tab !== 'all');
      document.getElementById('pairTab').classList.toggle('hidden', tab !== 'pair');
    }
    
    function render() {
      const grid = document.getElementById('eggGrid');
      grid.innerHTML = Object.entries(EGG_GROUPS).map(([name, data]) => {
        const tags = data.pets.map(pet => {
          const isSel = selected.find(s => s.name === pet);
          return `<span class="tag ${isSel ? 'active' : ''}" style="${isSel ? `--c:${data.color};--cs:${data.color}40` : ''}" onclick="togglePet('${pet}','${name}')">${pet}</span>`;
        }).join('');
        return `
          <div class="card" style="--c:${data.color};--cl:${data.color}40;--cs:${data.color}30">
            <div class="card-header">
              <div class="card-icon">${data.emoji}</div>
              <div>
                <div class="card-title">${name}</div>
                <div class="card-count">${data.pets.length} 只精灵</div>
              </div>
            </div>
            <div class="tags">${tags}</div>
          </div>
        `;
      }).join('');
      updateSelected();
    }
    
    function togglePet(name, group) {
      const idx = selected.findIndex(s => s.name === name);
      if (idx >= 0) {
        selected.splice(idx, 1);
        showToast(`已移除 ${name}`);
      } else if (selected.length < 6) {
        selected.push({ name, group });
        showToast(`已添加 ${name}`);
      } else {
        showToast('最多选择 6 个精灵');
      }
      render();
    }
    
    function updateSelected() {
      const box = document.getElementById('selectedTags');
      if (selected.length === 0) {
        box.innerHTML = '<span style="color:#64748b;font-size:14px">暂无选择</span>';
        return;
      }
      box.innerHTML = selected.map(s => {
        const color = EGG_GROUPS[s.group].color;
        return `<span class="selected-tag" style="border:2px solid ${color}">${EGG_GROUPS[s.group].emoji} ${s.name} <span style="cursor:pointer;margin-left:4px" onclick="togglePet('${s.name}','${s.group}')">×</span></span>`;
      }).join('');
    }
    
    function clearAll() {
      selected = [];
      render();
      document.getElementById('results').classList.add('hidden');
      showToast('已清空选择');
    }
    
    function findPairs() {
      const results = document.getElementById('results');
      if (selected.length === 0) {
        showToast('请先选择精灵');
        return;
      }
      
      const pairs = [];
      selected.forEach(p1 => {
        selected.forEach(p2 => {
          if (p1.name !== p2.name && p1.group === p2.group) {
            const key = [p1.name, p2.name].sort().join('-');
            if (!pairs.find(p => p.key === key)) {
              pairs.push({ key, p1: p1.name, p2: p2.name, group: p1.group, ...EGG_GROUPS[p1.group] });
            }
          }
        });
      });
      
      results.classList.remove('hidden');
      if (pairs.length === 0) {
        results.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8"><div style="font-size:48px;margin-bottom:12px">🔍</div><div>未找到可配对的组合</div></div>';
      } else {
        results.innerHTML = '<h3 style="font-size:18px;font-weight:800;margin-bottom:16px">💕 配对结果</h3>' + pairs.map(p => `
          <div class="result-item">
            <div style="font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:white;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">${p.emoji}</div>
            <div style="flex:1">
              <div style="font-weight:800;font-size:16px">${p.p1} + ${p.p2}</div>
              <div style="font-size:13px;color:#64748b;font-weight:600">${p.group} · 可孵蛋配对</div>
            </div>
          </div>
        `).join('');
      }
    }
    
    // Search
    document.getElementById('searchInput').addEventListener('input', function() {
      const term = this.value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(term) ? '' : 'none';
      });
    });
    
    render();
  </script>
</body>
</html>
