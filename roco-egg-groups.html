<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>蛋组图鉴 - 孵蛋配对查询</title>
    <meta name="color-scheme" content="light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "sans-serif"],
            },
            colors: {
              primary: "#2563EB",
              secondary: "#3B82F6",
              cta: "#F97316",
              bg: "#F8FAFC",
              text: "#1E293B",
            },
            boxShadow: {
              sm: "0 1px 2px rgba(0,0,0,0.05)",
              md: "0 4px 6px rgba(0,0,0,0.1)",
              lg: "0 10px 15px rgba(0,0,0,0.1)",
              xl: "0 20px 25px rgba(0,0,0,0.15)",
            },
          },
        },
      };
    </script>
    <style>
      /* Minimal CSS: keep a11y + scrollbar + reduced motion */
      @media (prefers-reduced-motion: reduce) {
        * {
          scroll-behavior: auto !important;
          transition-duration: 0ms !important;
          animation-duration: 0ms !important;
        }
      }
      :root {
        /* From design-system/洛克王国蛋组图鉴/MASTER.md */
        --color-primary: #2563eb;
        --color-secondary: #3b82f6;
        --color-cta: #f97316;
        --color-background: #f8fafc;
        --color-text: #1e293b;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      }
      body {
        margin: 0;
        background: var(--color-background);
        color: var(--color-text);
        font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }

      /* Layout */
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 16px 60px;
      }
      .header {
        position: relative;
        overflow: hidden;
        padding: 34px 20px 22px;
        text-align: center;
        border-bottom: 1px solid rgba(30, 41, 59, 0.10);
        background: radial-gradient(circle at 30% 20%, rgba(37, 99, 235, 0.18) 0%, transparent 55%),
          radial-gradient(circle at 70% 75%, rgba(249, 115, 22, 0.16) 0%, transparent 50%),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }
      .brand .topline {
        font-size: 12px;
        color: rgba(30, 41, 59, 0.55);
        font-weight: 800;
        letter-spacing: 0.32em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .brand h1 {
        margin: 0 0 6px;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }
      .brand p {
        margin: 0;
        font-size: 14px;
        color: rgba(30, 41, 59, 0.62);
      }

      /* Glass cards */
      .section-card,
      .list-card {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 16px;
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .section-card {
        padding: 20px;
      }
      .grid1 {
        display: grid;
        gap: 14px;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: start;
      }
      @media (max-width: 820px) {
        .grid2 {
          grid-template-columns: 1fr;
        }
      }

      /* Toolbar + inputs */
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(30, 41, 59, 0.12);
        color: rgba(30, 41, 59, 0.85);
        font-weight: 800;
        font-size: 12px;
        user-select: none;
      }
      .toggle input {
        width: 16px;
        height: 16px;
        accent-color: var(--color-cta);
      }
      .ac {
        width: min(560px, 100%);
        position: relative;
      }
      .ac-inputbar {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(30, 41, 59, 0.14);
        border-radius: 14px;
        padding: 0 14px;
        box-shadow: var(--shadow-sm);
        transition: border-color 200ms ease, box-shadow 200ms ease;
      }
      .ac-inputbar:focus-within {
        border-color: rgba(37, 99, 235, 0.55);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14), var(--shadow-sm);
      }
      .ac-icon {
        font-size: 16px;
        opacity: 0.55;
      }
      .ac-inputbar input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--color-text);
        font-size: 15px;
        padding: 14px 0;
        font-family: inherit;
        min-width: 40px;
      }
      .ac-clear {
        border: none;
        background: transparent;
        color: rgba(30, 41, 59, 0.50);
        cursor: pointer;
        font-size: 20px;
        padding: 6px 6px;
        line-height: 1;
      }
      .ac-clear:hover {
        color: rgba(30, 41, 59, 0.80);
      }
      .ac-list {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 14px;
        z-index: 1000;
        max-height: 280px;
        overflow: auto;
        display: none;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .ac-list button {
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border: none;
        background: transparent;
        color: rgba(30, 41, 59, 0.92);
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        transition: background 200ms ease;
      }
      .ac-list button:hover {
        background: rgba(37, 99, 235, 0.08);
      }
      .ac-list button + button {
        border-top: 1px solid rgba(30, 41, 59, 0.08);
      }
      .ac-list button span.muted {
        font-size: 11px;
        opacity: 0.6;
        white-space: nowrap;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 6px;
        margin: 10px 0 18px;
        padding: 6px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(30, 41, 59, 0.12);
        box-shadow: var(--shadow-sm);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .tab-btn {
        flex: 1;
        padding: 10px 0;
        border-radius: 12px;
        border: 1px solid transparent;
        cursor: pointer;
        color: rgba(30, 41, 59, 0.65);
        font-weight: 900;
        font-size: 13px;
        font-family: inherit;
        background: transparent;
        transition: background 200ms ease, color 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
      }
      .tab-btn.active {
        background: rgba(37, 99, 235, 0.10);
        color: rgba(30, 41, 59, 0.92);
        border-color: rgba(37, 99, 235, 0.22);
        box-shadow: var(--shadow-sm);
      }
      .tab-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18), var(--shadow-sm);
      }

      /* Tags / buttons */
      .pet-tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .pet-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        border: 1.5px solid;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: background 200ms ease, color 200ms ease, box-shadow 200ms ease;
      }
      .pet-tag.small {
        padding: 4px 10px;
        font-size: 12px;
      }
      .pet-tag:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
      }
      .btn {
        border: 1px solid rgba(30, 41, 59, 0.14);
        background: rgba(255, 255, 255, 0.72);
        color: rgba(30, 41, 59, 0.92);
        font-weight: 900;
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        transition: background 200ms ease, border-color 200ms ease;
      }
      .btn:hover {
        border-color: rgba(37, 99, 235, 0.25);
        background: rgba(37, 99, 235, 0.06);
      }
      .input-mini {
        width: 100%;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(30, 41, 59, 0.14);
        border-radius: 12px;
        padding: 10px 12px;
        color: rgba(30, 41, 59, 0.92);
        font-family: inherit;
        outline: none;
        box-shadow: var(--shadow-sm);
        transition: border-color 200ms ease, box-shadow 200ms ease;
      }
      .input-mini:focus {
        border-color: rgba(37, 99, 235, 0.55);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14), var(--shadow-sm);
      }

      /* Browse layout */
      .two-col {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 12px;
        align-items: start;
      }
      @media (max-width: 820px) {
        .two-col {
          grid-template-columns: 1fr;
        }
      }
      .list-card {
        padding: 12px;
      }
      .list-btn {
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        border-radius: 12px;
        padding: 10px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: rgba(30, 41, 59, 0.92);
        font-family: inherit;
        transition: background 200ms ease, border-color 200ms ease;
      }
      .list-btn:hover {
        background: rgba(37, 99, 235, 0.06);
        border-color: rgba(37, 99, 235, 0.16);
      }
      .list-btn.active {
        background: rgba(37, 99, 235, 0.10);
        border-color: rgba(37, 99, 235, 0.22);
      }
      .list-left {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .list-title {
        font-weight: 900;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 999px;
        font-weight: 900;
        border: 1px solid rgba(30, 41, 59, 0.10);
        background: rgba(30, 41, 59, 0.04);
        color: rgba(30, 41, 59, 0.62);
        white-space: nowrap;
      }

      /* Text helpers */
      .hint {
        font-size: 12px;
        color: rgba(30, 41, 59, 0.62);
        line-height: 1.6;
      }
      .warn {
        color: #ef4444;
        font-weight: 900;
        margin-left: 8px;
      }
      .ok {
        color: #16a34a;
        font-weight: 900;
      }
      .pair-result {
        margin-top: 16px;
        padding: 16px;
        border-radius: 14px;
        text-align: center;
        border: 1px solid rgba(30, 41, 59, 0.12);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow-sm);
      }

      .footer-stats {
        margin-top: 28px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(30, 41, 59, 0.12);
        box-shadow: var(--shadow-sm);
        display: flex;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .stat {
        text-align: center;
      }
      .stat .num {
        font-size: 22px;
        font-weight: 900;
        color: var(--color-primary);
      }
      .stat .label {
        font-size: 11px;
        color: rgba(30, 41, 59, 0.60);
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(30, 41, 59, 0.2);
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="brand">
        <div class="topline">ROCO KINGDOM</div>
        <h1>蛋组图鉴</h1>
        <p>洛克王国精灵孵蛋配对查询工具</p>
      </div>
    </div>

    <div class="wrap">
      <div class="toolbar">
        <div class="ac" id="main-search-ac">
          <div class="ac-inputbar">
            <span class="ac-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path
                  d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M21 21l-4.35-4.35"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input id="main-search-input" placeholder="输入精灵名称搜索蛋组…" autocomplete="off" />
            <button class="ac-clear" id="main-search-clear" title="清空">×</button>
          </div>
          <div class="ac-list" id="main-search-list"></div>
        </div>
        <div class="toolbar-right">
          <label class="toggle" title="开启后会在候选/列表里隐藏未知组精灵">
            <input id="toggle-hide-unknown" type="checkbox" />
            隐藏不可孵蛋（未知组）
          </label>
        </div>
      </div>

      <div class="tabs" role="tablist" aria-label="功能切换">
        <button class="tab-btn active" id="tab-query-btn" type="button" role="tab" aria-selected="true" data-tab="query">
          查询
        </button>
        <button class="tab-btn" id="tab-browse-btn" type="button" role="tab" aria-selected="false" data-tab="browse">
          蛋组浏览
        </button>
        <button class="tab-btn" id="tab-pair-btn" type="button" role="tab" aria-selected="false" data-tab="pair">
          配对检测
        </button>
        <button class="tab-btn" id="tab-rules-btn" type="button" role="tab" aria-selected="false" data-tab="rules">
          孵蛋规则
        </button>
      </div>

      <div id="tab-content" class="grid1"></div>

      <div class="footer-stats">
        <div class="stat">
          <div class="num" id="stat-total-pets">0</div>
          <div class="label">精灵总数</div>
        </div>
        <div class="stat">
          <div class="num" id="stat-total-groups">0</div>
          <div class="label">蛋组数量</div>
        </div>
        <div class="stat">
          <div class="num" id="stat-multi-groups" style="color: var(--color-secondary)">0</div>
          <div class="label">多蛋组精灵</div>
        </div>
        <div class="stat">
          <div class="num" id="stat-unknown" style="color: #ef4444">0</div>
          <div class="label">不可孵蛋</div>
        </div>
      </div>
    </div>

    <!-- 数据文件：由 update_egg_groups.py 从 MD 自动生成 -->
    <script src="egg-groups-data.js"></script>

    <script>
      // pet -> groups index
      const PET_INDEX = {};
      Object.entries(EGG_GROUPS).forEach(([group, data]) => {
        data.pets.forEach((pet) => {
          if (!PET_INDEX[pet]) PET_INDEX[pet] = [];
          PET_INDEX[pet].push(group);
        });
      });

      const ALL_PETS = Object.keys(PET_INDEX).sort();
      const GROUP_NAMES = Object.keys(EGG_GROUPS);

      // Basic helpers
      function makePetTag(name, { small, onClick, highlightGroupColor } = {}) {
        const groups = PET_INDEX[name] || [];
        const mainGroup = groups[0];
        const mainColor = (mainGroup && EGG_GROUPS[mainGroup] && EGG_GROUPS[mainGroup].color) || "#888";
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-tag" + (small ? " small" : "");
        btn.dataset.pet = name;
        btn.style.background = mainColor + "18";
        btn.style.borderColor = mainColor + "40";
        btn.style.color = mainColor;
        btn.style.fontWeight = "800";
        btn.appendChild(document.createTextNode((groups.length > 1 ? "⬡ " : "") + name));
        if (onClick) btn.addEventListener("click", onClick);
        return btn;
      }

      function makeGroupPill(group, { active, onClick } = {}) {
        const pill = document.createElement("button");
        pill.type = "button";
        pill.className = "pill";
        pill.dataset.group = group;
        const color = EGG_GROUPS[group].color;
        pill.style.background = active ? color : color + "12";
        pill.style.color = active ? "#fff" : color;
        pill.style.border = "1.5px solid " + (active ? color : color + "30");
        pill.appendChild(document.createTextNode(`${EGG_GROUPS[group].emoji} ${group}`));
        const c = document.createElement("small");
        c.textContent = `(${EGG_GROUPS[group].pets.length})`;
        pill.appendChild(c);
        if (onClick) pill.addEventListener("click", onClick);
        return pill;
      }

      function setupAutocomplete(acInput, acList, { getSuggestions, onPick }) {
        let closeTimer = null;
        const hide = () => {
          acList.style.display = "none";
          acList.innerHTML = "";
        };

        const show = (items) => {
          acList.innerHTML = "";
          items.forEach((pet) => {
            const btn = document.createElement("button");
            btn.type = "button";
            const groups = (PET_INDEX[pet] || []).join(" · ");
            btn.innerHTML = `<span style="font-weight:800">${pet}</span><span class="muted">${groups}</span>`;
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              acInput.value = pet; // 选中后同步输入框内容
              onPick(pet);
              hide();
            });
            acList.appendChild(btn);
          });
          acList.style.display = items.length ? "block" : "none";
        };

        const onDocMouseDown = (e) => {
          const root = acInput.closest(".ac");
          if (!root) return;
          if (!root.contains(e.target)) hide();
        };
        document.addEventListener("mousedown", onDocMouseDown);

        acInput.addEventListener("input", () => {
          const q = acInput.value.trim();
          if (!q) {
            hide();
            return;
          }
          const items = getSuggestions(q);
          show(items);
        });

        acInput.addEventListener("focus", () => {
          if (acInput.value.trim()) {
            const items = getSuggestions(acInput.value.trim());
            show(items);
          }
        });

        return { hide };
      }

      // App state
      const state = {
        tab: "query", // query | browse | pair | rules
        mainSearch: "",
        selectedPet: null,
        selectedGroup: null,
        pairA: null,
        pairB: null,
        hideUnknown: false,
      };

      // Elements
      const tabContent = document.getElementById("tab-content");

      const mainSearchInput = document.getElementById("main-search-input");
      const mainSearchClear = document.getElementById("main-search-clear");
      const mainSearchList = document.getElementById("main-search-list");
      const toggleHideUnknown = document.getElementById("toggle-hide-unknown");

      const tabQueryBtn = document.getElementById("tab-query-btn");
      const tabBrowseBtn = document.getElementById("tab-browse-btn");
      const tabPairBtn = document.getElementById("tab-pair-btn");
      const tabRulesBtn = document.getElementById("tab-rules-btn");

      function setTab(tab) {
        state.tab = tab;
        const mapping = {
          query: tabQueryBtn,
          browse: tabBrowseBtn,
          pair: tabPairBtn,
          rules: tabRulesBtn,
        };
        [tabQueryBtn, tabBrowseBtn, tabPairBtn, tabRulesBtn].forEach((b) => {
          b.classList.toggle("active", b.dataset.tab === tab);
          b.setAttribute("aria-selected", String(b.dataset.tab === tab));
        });
        render();
      }

      function isUnknownPet(pet) {
        const gs = PET_INDEX[pet] || [];
        return gs.includes("未知组");
      }

      function getVisiblePets(list) {
        if (!state.hideUnknown) return list;
        return list.filter((p) => !isUnknownPet(p));
      }

      function renderPetResultCard() {
        if (!state.selectedPet || !PET_INDEX[state.selectedPet]) return "";

        const groups = PET_INDEX[state.selectedPet];
        const firstGroup = groups[0];
        const firstMeta = EGG_GROUPS[firstGroup] || { color: "#888", emoji: "" };

        const unknownWarn = groups.includes("未知组");

        // mates: only if not unknown (simplified from JSX)
        let mates = [];
        if (!unknownWarn) {
          const mateSet = new Set();
          groups.forEach((g) => {
            if (g === "未知组") return;
            EGG_GROUPS[g].pets.forEach((p) => {
              if (p !== state.selectedPet && !(PET_INDEX[p] || []).includes("未知组")) {
                mateSet.add(p);
              }
            });
          });
          mates = Array.from(mateSet).sort();
          mates = getVisiblePets(mates);
        }

        const tagHtml = groups
          .map((g) => {
            const meta = EGG_GROUPS[g];
            const color = meta?.color || "#888";
            const count = meta?.pets?.length || 0;
            return `<button type="button" class="pet-tag" style="background:${color}18;border-color:${color}40;color:${color};font-weight:900; padding:5px 14px" data-group="${g}">
              <span>${meta.emoji}</span> <span>${g}</span> <span style="opacity:.65;font-size:12px">(${count})</span>
            </button>`;
          })
          .join("");

        let matesHtml = "";
        if (!unknownWarn) {
          const slice = mates.slice(0, 36);
          const tags = slice
            .map((p) => {
              const pg = PET_INDEX[p] || [];
              const main = pg[0];
              const meta = EGG_GROUPS[main] || { color: "#888", emoji: "" };
              const multi = pg.length > 1 ? "⬡ " : "";
              return `<button type="button" class="pet-tag small" style="background:${meta.color}18;border-color:${meta.color}40;color:${meta.color}" data-pet="${p}">${multi}${p}</button>`;
            })
            .join("");
          matesHtml = `
            <div style="margin-top:16px">
              <div class="section-title" style="margin-bottom:10px">可配对的精灵（共同蛋组）</div>
              <div class="pet-tag-row">${tags}${mates.length > slice.length ? `<div class="hint">+${mates.length - slice.length} 更多</div>` : ""}</div>
            </div>
          `;
        }

        const html = `
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px">
            <div style="width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg, ${firstMeta.color}40, ${firstMeta.color}15);display:flex;align-items:center;justify-content:center;font-size:22">
              ${firstMeta.emoji}
            </div>
            <div>
              <div style="font-weight:900;font-size:20px">${state.selectedPet}</div>
              <div class="hint" style="margin-top:2px">
                属于 <b>${groups.length}</b> 个蛋组
                ${
                  unknownWarn
                    ? `<span class="warn">⚠ 不可孵蛋</span>`
                    : `<span style="opacity:.8;margin-left:8px"></span>`
                }
              </div>
            </div>
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:8px">
            ${tagHtml}
          </div>
          ${matesHtml}
        `;
        return html;
      }

      function renderQueryTab() {
        tabContent.innerHTML = "";
        const card = document.createElement("div");
        card.className = "section-card";
        card.style.padding = "20px";

        const q = state.mainSearch.trim();
        const exact = q && PET_INDEX[q] ? q : null;

        if (exact) {
          card.innerHTML = renderPetResultCard();
        } else if (q) {
          const matches = getVisiblePets(ALL_PETS.filter((p) => p.includes(q))).slice(0, 24);
          card.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
              <div style="font-weight:900; font-size:16px">未找到精灵：<span style="color:var(--color-cta)">${q}</span></div>
            </div>
            <div class="hint" style="margin-bottom:12px">你可以从下方候选中点击选择，或继续输入更完整的名字。</div>
            <div class="pet-tag-row" id="query-match-row"></div>
          `;
          const row = card.querySelector("#query-match-row");
          matches.forEach((p) => {
            const tag = makePetTag(p, {
              small: true,
              onClick: () => {
                state.selectedPet = p;
                state.mainSearch = p;
                mainSearchInput.value = p;
                render();
              },
            });
            row.appendChild(tag);
          });
          if (!matches.length) {
            const empty = document.createElement("div");
            empty.className = "hint";
            empty.textContent = state.hideUnknown
              ? "没有匹配项（可能被“隐藏不可孵蛋”过滤了）。"
              : "没有匹配项。";
            row.appendChild(empty);
          }
        } else {
          card.innerHTML = `
            <div style="text-align:center; padding:18px 6px">
              <div style="font-weight:900; margin-top:6px">先在上方搜索一个精灵</div>
              <div class="hint" style="margin-top:8px">例如：火神、瞌睡王、梦悠悠…</div>
            </div>
          `;
        }

        tabContent.appendChild(card);

        // attach events inside query card (group jumps / pet clicks)
        tabContent.querySelectorAll("button[data-group]").forEach((btn) => {
          btn.addEventListener("click", () => {
            state.selectedGroup = btn.dataset.group;
            setTab("browse");
          });
        });
        tabContent.querySelectorAll("button[data-pet]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const p = btn.dataset.pet;
            state.selectedPet = p;
            state.selectedGroup = null;
            mainSearchInput.value = p;
            state.mainSearch = p;
            render();
          });
        });
      }

      function renderBrowseTab() {
        const selGroup = state.selectedGroup || GROUP_NAMES[0];

        tabContent.innerHTML = "";
        const layout = document.createElement("div");
        layout.className = "two-col";

        const left = document.createElement("div");
        left.className = "list-card";
        left.innerHTML = `<div class="section-title" style="margin:6px 8px 10px">蛋组列表</div>`;

        const right = document.createElement("div");
        right.className = "section-card";
        right.style.padding = "18px";
        right.id = "group-detail";

        layout.appendChild(left);
        layout.appendChild(right);
        tabContent.appendChild(layout);

        // left list
        GROUP_NAMES.forEach((g) => {
          const meta = EGG_GROUPS[g];
          const allCount = meta.pets.length;
          const visibleCount = getVisiblePets(meta.pets).length;
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "list-btn" + (g === selGroup ? " active" : "");
          btn.dataset.group = g;
          btn.innerHTML = `
            <span class="list-left">
              <span style="font-size:18px">${meta.emoji}</span>
              <span class="list-title" style="color:${meta.color}">${g}</span>
              ${g === "未知组" ? `<span class="badge" style="color:#ef4444;border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.10)">不可孵蛋</span>` : ""}
            </span>
            <span class="badge" title="${state.hideUnknown ? "显示数/总数" : "总数"}">
              ${state.hideUnknown ? `${visibleCount}/${allCount}` : `${allCount}`}
            </span>
          `;
          btn.addEventListener("click", () => {
            state.selectedGroup = g;
            render();
          });
          left.appendChild(btn);
        });

        // right detail
        const meta = EGG_GROUPS[selGroup];
        const warning = selGroup === "未知组" ? `<span class="warn">⚠ 本组精灵均不可孵蛋</span>` : "";
        right.style.borderColor = meta.color + "30";
        right.innerHTML = `
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap">
            <div style="display:flex; align-items:center; gap:12px">
              <div style="width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg, ${meta.color}50, ${meta.color}20);display:flex;align-items:center;justify-content:center;font-size:24">${meta.emoji}</div>
              <div>
                <div style="font-size:20px; font-weight:900; color:${meta.color}; margin-bottom:2px">${selGroup}</div>
                <div class="hint">${meta.pets.length} 只精灵 ${warning}</div>
              </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
              <button class="btn" type="button" id="btn-copy-group">复制本组名单</button>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px">
            <input class="input-mini" id="group-filter-input" placeholder="组内搜索（按名字包含）…" />
          </div>
          <div class="pet-tag-row" id="group-pet-list"></div>
          <div class="hint" style="margin-top:10px">点击精灵可回到“查询”页查看蛋组与可配对。</div>
        `;

        const filterInput = right.querySelector("#group-filter-input");
        const list = right.querySelector("#group-pet-list");
        const copyBtn = right.querySelector("#btn-copy-group");

        function renderGroupPets() {
          const q = filterInput.value.trim();
          list.innerHTML = "";
          let pets = meta.pets.slice();
          pets = getVisiblePets(pets);
          if (q) pets = pets.filter((p) => p.includes(q));
          pets.forEach((pet) => {
            const tag = makePetTag(pet, {
              small: false,
              onClick: () => {
                state.selectedPet = pet;
                state.mainSearch = pet;
                mainSearchInput.value = pet;
                setTab("query");
              },
            });
            list.appendChild(tag);
          });
          if (!pets.length) {
            const empty = document.createElement("div");
            empty.className = "hint";
            empty.textContent = state.hideUnknown
              ? "没有匹配项（可能被“隐藏不可孵蛋”过滤了）。"
              : "没有匹配项。";
            list.appendChild(empty);
          }
        }

        filterInput.addEventListener("input", renderGroupPets);
        copyBtn.addEventListener("click", async () => {
          const q = filterInput.value.trim();
          let pets = meta.pets.slice();
          pets = getVisiblePets(pets);
          if (q) pets = pets.filter((p) => p.includes(q));
          const text = pets.join("，");
          try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = "已复制";
            setTimeout(() => (copyBtn.textContent = "复制本组名单"), 800);
          } catch {
            // fallback
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            copyBtn.textContent = "已复制";
            setTimeout(() => (copyBtn.textContent = "复制本组名单"), 800);
          }
        });

        renderGroupPets();
      }

      function renderPairTab() {
        tabContent.innerHTML = "";

        const card = document.createElement("div");
        card.className = "section-card";
        card.style.padding = "24px";
        card.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px">
            <div style="font-weight:900; font-size:18px">孵蛋配对检测</div>
          </div>
          <div class="grid2">
            <div>
              <div class="section-title">精灵 A</div>
              <div class="ac" id="pair-ac-a">
                <div class="ac-inputbar">
                  <span class="ac-icon">🔍</span>
                  <input id="pair-input-a" placeholder="搜索精灵…" autocomplete="off" />
                  <button class="ac-clear" id="pair-clear-a" title="清空">×</button>
                </div>
                <div class="ac-list" id="pair-list-a"></div>
              </div>
              <div id="pair-tags-a" style="margin-top:10px"></div>
            </div>
            <div style="display:flex; align-items:center; justify-content:center; opacity:.4; font-size:28px; padding-top:16px">
              ×
            </div>
            <div>
              <div class="section-title">精灵 B</div>
              <div class="ac" id="pair-ac-b">
                <div class="ac-inputbar">
                  <span class="ac-icon">🔍</span>
                  <input id="pair-input-b" placeholder="搜索精灵…" autocomplete="off" />
                  <button class="ac-clear" id="pair-clear-b" title="清空">×</button>
                </div>
                <div class="ac-list" id="pair-list-b"></div>
              </div>
              <div id="pair-tags-b" style="margin-top:10px"></div>
            </div>
          </div>
          <div id="pair-result" class="pair-result" style="display:none"></div>
        `;
        tabContent.appendChild(card);

        const inputA = document.getElementById("pair-input-a");
        const listA = document.getElementById("pair-list-a");
        const clearA = document.getElementById("pair-clear-a");
        const inputB = document.getElementById("pair-input-b");
        const listB = document.getElementById("pair-list-b");
        const clearB = document.getElementById("pair-clear-b");

        const tagsA = document.getElementById("pair-tags-a");
        const tagsB = document.getElementById("pair-tags-b");
        const result = document.getElementById("pair-result");

        function renderPairTags() {
          tagsA.innerHTML = "";
          tagsB.innerHTML = "";
          if (state.pairA && PET_INDEX[state.pairA]) {
            PET_INDEX[state.pairA].forEach((g) => {
              const meta = EGG_GROUPS[g];
              const s = document.createElement("span");
              s.className = "pet-tag small";
              s.style.background = meta.color + "18";
              s.style.borderColor = meta.color + "30";
              s.style.color = meta.color;
              s.style.cursor = "default";
              s.style.fontWeight = "900";
              s.textContent = `${meta.emoji} ${g}`;
              tagsA.appendChild(s);
            });
          }
          if (state.pairB && PET_INDEX[state.pairB]) {
            PET_INDEX[state.pairB].forEach((g) => {
              const meta = EGG_GROUPS[g];
              const s = document.createElement("span");
              s.className = "pet-tag small";
              s.style.background = meta.color + "18";
              s.style.borderColor = meta.color + "30";
              s.style.color = meta.color;
              s.style.cursor = "default";
              s.style.fontWeight = "900";
              s.textContent = `${meta.emoji} ${g}`;
              tagsB.appendChild(s);
            });
          }
        }

        function renderPairResult() {
          result.style.display = "none";
          if (!state.pairA || !state.pairB) return;
          const groupsA = PET_INDEX[state.pairA] || [];
          const groupsB = PET_INDEX[state.pairB] || [];
          const isUnknownA = groupsA.includes("未知组");
          const isUnknownB = groupsB.includes("未知组");
          const shared = groupsA.filter((g) => groupsB.includes(g) && g !== "未知组");
          const canBreed = shared.length > 0 && !isUnknownA && !isUnknownB;

          const sharedText = shared.map((g) => `${EGG_GROUPS[g].emoji} ${g}`).join("、");

          if (canBreed) {
            result.style.background = "#22c55e12";
            result.style.borderColor = "#22c55e30";
            result.innerHTML = `
              <div style="font-size:28px; margin-bottom:6px">🥚</div>
              <div class="ok" style="font-size:16px; margin-bottom:6px">可以孵蛋！</div>
              <div class="hint">共同蛋组：${sharedText}</div>
            `;
          } else {
            result.style.background = "#ef444412";
            result.style.borderColor = "#ef444430";
            let why = "两只精灵没有共同的蛋组";
            if (isUnknownA || isUnknownB) why = "未知组的精灵无法参与孵蛋";
            result.innerHTML = `
              <div style="font-size:28px; margin-bottom:6px">🚫</div>
              <div style="color:#ef4444;font-weight:900;font-size:16px; margin-bottom:6px">无法孵蛋</div>
              <div class="hint">${why}</div>
            `;
          }
          result.style.display = "block";
        }

        function attachPairAutocomplete(inputEl, listEl, which) {
          setupAutocomplete(inputEl, listEl, {
            getSuggestions: (q) => getVisiblePets(ALL_PETS.filter((p) => p.includes(q))).slice(0, 8),
            onPick: (pet) => {
              if (which === "A") state.pairA = pet;
              else state.pairB = pet;
              renderPairTags();
              renderPairResult();
            },
          });
        }

        attachPairAutocomplete(inputA, listA, "A");
        attachPairAutocomplete(inputB, listB, "B");

        clearA.addEventListener("click", () => {
          state.pairA = null;
          inputA.value = "";
          renderPairTags();
          renderPairResult();
        });
        clearB.addEventListener("click", () => {
          state.pairB = null;
          inputB.value = "";
          renderPairTags();
          renderPairResult();
        });

        // initial
        renderPairTags();
        renderPairResult();
      }

      function renderRulesTab() {
        tabContent.innerHTML = "";
        const card = document.createElement("div");
        card.className = "section-card";
        card.style.padding = "24px";

        card.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px">
            <div style="font-weight:900; font-size:18px">孵蛋规则</div>
          </div>
          <div class="grid1">
            <div class="rule-item">
              <div class="rule-emoji">📖</div>
              <div>
                <div class="rule-title">基本规则</div>
                <div class="hint">两只精灵必须拥有至少一个相同的蛋组，才能进行配对孵蛋。后代的种族与母方（或指定的一方）一致。</div>
              </div>
            </div>
            <div class="rule-item">
              <div class="rule-emoji">⬡</div>
              <div>
                <div class="rule-title">多蛋组精灵</div>
                <div class="hint">部分精灵同时属于多个蛋组（标有 ⬡ 标记），它们可以与更多精灵配对，是孵蛋链中非常重要的“桥梁精灵”。</div>
              </div>
            </div>
            <div class="rule-item">
              <div class="rule-emoji">❓</div>
              <div>
                <div class="rule-title">未知组限制</div>
                <div class="hint">属于“未知组”的精灵（阿布、龙溪帕尔、圣翼羽王、绒仙子、极光千兽）无法参与孵蛋，也不能与任何精灵配对。</div>
              </div>
            </div>
          </div>
        `;
        tabContent.appendChild(card);
      }

      function render() {
        if (state.tab === "query") renderQueryTab();
        else if (state.tab === "browse") renderBrowseTab();
        else if (state.tab === "pair") renderPairTab();
        else renderRulesTab();
      }

      // Main search autocomplete
      const mainAcSetup = setupAutocomplete(mainSearchInput, mainSearchList, {
        getSuggestions: (q) => getVisiblePets(ALL_PETS.filter((p) => p.includes(q))).slice(0, 8),
        onPick: (pet) => {
          state.selectedPet = pet;
          state.mainSearch = pet;
          state.selectedGroup = null;
          setTab("query");
          render();
        },
      });

      mainSearchClear.addEventListener("click", () => {
        state.mainSearch = "";
        state.selectedPet = null;
        state.selectedGroup = null;
        mainSearchInput.value = "";
        render();
      });

      // Tab wiring
      tabQueryBtn.addEventListener("click", () => setTab("query"));
      tabBrowseBtn.addEventListener("click", () => setTab("browse"));
      tabPairBtn.addEventListener("click", () => setTab("pair"));
      tabRulesBtn.addEventListener("click", () => setTab("rules"));

      // If user manually types and clears selection:
      mainSearchInput.addEventListener("input", () => {
        const q = mainSearchInput.value.trim();
        state.mainSearch = q;
        if (!q) {
          state.selectedPet = null;
          state.selectedGroup = null;
          render();
          return;
        }
        if (PET_INDEX[q]) {
          state.selectedPet = q;
          state.selectedGroup = null;
          setTab("query");
          render();
        } else {
          state.selectedPet = null;
          if (state.tab === "query") render();
        }
      });

      toggleHideUnknown.addEventListener("change", () => {
        state.hideUnknown = toggleHideUnknown.checked;
        // 如果当前选中的是未知组精灵，开启隐藏后就清掉选择，避免“看不见但还选中”
        if (state.hideUnknown && state.selectedPet && isUnknownPet(state.selectedPet)) {
          state.selectedPet = null;
          state.mainSearch = "";
          mainSearchInput.value = "";
        }
        render();
      });

      // Stats
      function renderStats() {
        const totalPets = ALL_PETS.length;
        const totalGroups = GROUP_NAMES.length;
        const multi = ALL_PETS.filter((p) => (PET_INDEX[p] || []).length > 1).length;
        const unknown = EGG_GROUPS["未知组"].pets.length;
        document.getElementById("stat-total-pets").textContent = totalPets;
        document.getElementById("stat-total-groups").textContent = totalGroups;
        document.getElementById("stat-multi-groups").textContent = multi;
        document.getElementById("stat-unknown").textContent = unknown;
      }

      renderStats();
      render();
    </script>
  </body>
</html>
